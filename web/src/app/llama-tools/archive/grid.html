<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Art Project Layout</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white">

    <!-- Main Container -->
    <div class="container mx-auto p-8">
        
        <!-- Section: Projects -->
        <div class="mb-12">
            <h2 class="text-3xl font-bold mb-6">Projects</h2>
            <div class="grid grid-cols-3 gap-4">
                <!-- Each project card -->
                <div class="bg-gray-800 p-4 rounded-md shadow-lg">
                    <img src="your-image-url" alt="Project Image" class="w-full h-32 object-cover rounded-md mb-2">
                    <p class="font-semibold">Our Choice (2010)</p>
                    <p class="text-sm">Infographics redefined.</p>
                </div>
                <div class="bg-gray-800 p-4 rounded-md shadow-lg">
                    <img src="your-image-url" alt="Apple" class="w-full h-32 object-cover rounded-md mb-2">
                    <p class="font-semibold">Apple (2007-2010)</p>
                    <p class="text-sm">Inventor shift.</p>
                </div>
                <!-- Add more project cards as needed -->
            </div>
        </div>
        
        <!-- Section: Art -->
        <div class="mb-12">
            <h2 class="text-3xl font-bold mb-6">Art</h2>
            <div class="grid grid-cols-4 gap-4">
                <!-- Each art card -->
                <div class="bg-gray-800 p-4 rounded-md shadow-lg">
                    <img src="your-image-url" alt="Art Image" class="w-full h-32 object-cover rounded-md mb-2">
                    <p class="font-semibold">Trampoline</p>
                </div>
                <div class="bg-gray-800 p-4 rounded-md shadow-lg">
                    <img src="your-image-url" alt="Grim Sweeper" class="w-full h-32 object-cover rounded-md mb-2">
                    <p class="font-semibold">Grim Sweeper</p>
                </div>
                <!-- Add more art cards as needed -->
            </div>
        </div>

        <!-- Section: Small Things -->
        <div class="mb-12">
            <h2 class="text-3xl font-bold mb-6">Small Things</h2>
            <div class="grid grid-cols-3 gap-4">
                <!-- Each small things card -->
                <div class="bg-gray-800 p-4 rounded-md shadow-lg">
                    <img src="your-image-url" alt="Interactive Library" class="w-full h-32 object-cover rounded-md mb-2">
                    <p class="font-semibold">Interactive Library</p>
                </div>
                <div class="bg-gray-800 p-4 rounded-md shadow-lg">
                    <img src="your-image-url" alt="Resistor Decoder" class="w-full h-32 object-cover rounded-md mb-2">
                    <p class="font-semibold">Resistor Decoder</p>
                </div>
                <!-- Add more small things cards as needed -->
            </div>
        </div>

        <!-- Section: Desktops -->
        <div class="mb-12">
            <h2 class="text-3xl font-bold mb-6">Desktops</h2>
            <div class="grid grid-cols-4 gap-4">
                <!-- Each desktop card -->
                <div class="bg-gray-800 p-4 rounded-md shadow-lg">
                    <img src="your-image-url" alt="Desktop Image" class="w-full h-32 object-cover rounded-md mb-2">
                    <p class="font-semibold">Blind Date</p>
                </div>
                <div class="bg-gray-800 p-4 rounded-md shadow-lg">
                    <img src="your-image-url" alt="Freedom" class="w-full h-32 object-cover rounded-md mb-2">
                    <p class="font-semibold">Freedom</p>
                </div>
                <!-- Add more desktop cards as needed -->
            </div>
        </div>

        <!-- Section: Flyers -->
        <div class="mb-12">
            <h2 class="text-3xl font-bold mb-6">Flyers</h2>
            <div class="grid grid-cols-4 gap-4">
                <!-- Each flyer card -->
                <div class="bg-gray-800 p-4 rounded-md shadow-lg">
                    <img src="your-image-url" alt="Flyer Image" class="w-full h-32 object-cover rounded-md mb-2">
                    <p class="font-semibold">Shirts 2009</p>
                </div>
                <div class="bg-gray-800 p-4 rounded-md shadow-lg">
                    <img src="your-image-url" alt="Gatees" class="w-full h-32 object-cover rounded-md mb-2">
                    <p class="font-semibold">Gatees</p>
                </div>
                <!-- Add more flyer cards as needed -->
            </div>
        </div>
    </div>
</body>
</html>
